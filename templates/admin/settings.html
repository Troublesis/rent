{{define "content"}}
<form class="card max-w-2xl space-y-6 p-6" method="post" action="/admin/settings" data-validate-form>
  <div>
    <h3 class="text-2xl font-black">公开联系信息</h3>
    <p class="mt-2 text-sm text-stone-600">这些信息会显示在公开房源页面底部和详情页。</p>
  </div>
  <label class="block">
    <span class="text-sm font-bold text-stone-600">房东姓名 <span class="text-red-600">*</span></span>
    <input class="input mt-2" name="landlord_name" value="{{.Settings.LandlordName}}" required data-validate="required" data-label="房东姓名">
  </label>
  <label class="block">
    <span class="text-sm font-bold text-stone-600">联系电话 <span class="text-red-600">*</span></span>
    <input class="input mt-2" name="landlord_phone" value="{{.Settings.LandlordPhone}}" required inputmode="numeric" pattern="1[3-9][0-9]{9}" data-validate="phone">
  </label>
  <div class="flex flex-col-reverse gap-3 sm:flex-row sm:items-center sm:justify-between">
    <button class="btn-danger w-full sm:w-auto" type="submit" form="admin-logout-form" data-confirm="确认退出登录？">退出登录</button>
    <button class="btn-primary w-full sm:w-auto" type="submit">保存设置</button>
  </div>
</form>
<form id="admin-logout-form" method="post" action="/admin/logout"></form>
{{end}}
