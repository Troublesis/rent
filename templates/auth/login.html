{{define "content"}}
<section class="w-full max-w-md rounded-[2rem] border border-white/10 bg-white/10 p-8 shadow-2xl backdrop-blur-xl">
  <p class="text-xs font-bold tracking-[0.45em] text-amber-200">房东后台</p>
  <h1 class="mt-4 text-4xl font-black">房东登录</h1>
  <p class="mt-3 text-sm leading-6 text-stone-300">进入后台管理房源、租客和收款记录。</p>
  {{if .Error}}
    <div class="mt-6 rounded-2xl border border-red-300/30 bg-red-500/15 px-4 py-3 text-sm text-red-100">{{.Error}}</div>
  {{end}}
  <form class="mt-8 space-y-5" method="post" action="/admin/login" data-validate-form>
    <label class="block">
      <span class="text-sm font-semibold text-stone-200">账号 <span class="text-red-300">*</span></span>
      <input class="input mt-2 text-stone-950" name="username" value="{{.Username}}" autocomplete="username" required data-validate="required" data-label="账号">
    </label>
    <label class="block">
      <span class="text-sm font-semibold text-stone-200">密码 <span class="text-red-300">*</span></span>
      <input class="input mt-2 text-stone-950" type="password" name="password" autocomplete="current-password" required data-validate="required" data-label="密码">
    </label>
    <label class="flex items-center gap-3 text-sm text-stone-300">
      <input type="checkbox" name="remember" class="h-4 w-4 rounded border-stone-400">
      记住密码
    </label>
    <button class="btn-primary w-full" type="submit">进入后台</button>
  </form>
</section>
{{end}}
