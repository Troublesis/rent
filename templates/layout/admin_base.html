{{define "admin_base"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · 房东账本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-[var(--paper)] text-[var(--ink)]">
  <div class="min-h-screen xl:flex">
    <aside class="ink-panel xl:fixed xl:inset-y-0 xl:left-0 xl:w-[240px] p-6 text-stone-100">
      <a href="/admin/dashboard" class="block">
        <p class="text-xs tracking-[0.4em] text-amber-200/70">租房账本</p>
        <h1 class="mt-3 text-3xl font-black tracking-tight">房东账本</h1>
        <p class="mt-2 text-sm text-stone-300">房源、租客、收款，一处管理。</p>
      </a>
      <nav class="mt-10 space-y-2 text-sm">
        <a class="nav-item {{if eq .CurrentPath "/admin/dashboard"}}nav-active{{end}}" href="/admin/dashboard">仪表盘</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/rooms"}}nav-active{{end}}" href="/admin/rooms">房源管理</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/tenants"}}nav-active{{end}}" href="/admin/tenants">租客管理</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/payments"}}nav-active{{end}}" href="/admin/payments">收款记录</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/stats"}}nav-active{{end}}" href="/admin/stats">数据统计</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/settings"}}nav-active{{end}}" href="/admin/settings">系统设置</a>
      </nav>
      <form class="mt-10" method="post" action="/admin/logout">
        <button class="w-full rounded-2xl border border-white/15 px-4 py-3 text-left text-sm text-stone-200 transition hover:bg-white/10" type="submit">退出登录</button>
      </form>
    </aside>
    <main class="w-full xl:pl-[240px]">
      <div class="w-full max-w-none px-5 py-8 md:px-6 xl:px-8">
        <header class="mb-8 flex flex-col gap-3 border-b border-stone-300/70 pb-6 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-xs font-bold tracking-[0.35em] text-amber-700">个人房东收租系统</p>
            <h2 class="mt-2 text-3xl font-black tracking-tight md:text-4xl">{{.Title}}</h2>
          </div>
          <a class="text-sm font-semibold text-stone-600 hover:text-stone-950" href="/" target="_blank">查看公开页面</a>
        </header>
        {{if .Error}}
          <div class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{.Error}}</div>
        {{end}}
        {{template "content" .}}
      </div>
    </main>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
