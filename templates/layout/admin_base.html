{{define "admin_base"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · 房东账本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="{{asset "/static/css/app.css"}}">
</head>
<body class="min-h-screen bg-[var(--paper)] text-[var(--ink)]">
  <header class="admin-topbar lg:hidden">
    <a class="admin-topbar-brand" href="/admin/dashboard">
      <span>租房账本</span>
      <strong>房东账本</strong>
    </a>
    <button class="admin-topbar-hamburger" type="button" aria-label="打开菜单" data-drawer-toggle aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16"/>
      </svg>
    </button>
  </header>

  <div class="admin-drawer-root" data-open="false" data-drawer aria-hidden="true">
    <button class="admin-drawer-backdrop" type="button" aria-label="关闭菜单" data-drawer-close></button>
    <aside class="admin-drawer-panel" role="dialog" aria-modal="true" aria-label="管理菜单">
      <button class="admin-drawer-close" type="button" aria-label="关闭菜单" data-drawer-close>×</button>
      <a href="/admin/dashboard" class="mb-4 block">
        <p class="text-xs tracking-[0.4em] text-amber-200/70">租房账本</p>
        <h1 class="mt-2 text-2xl font-black tracking-tight">房东账本</h1>
        <p class="mt-2 text-sm text-stone-300">房源、租客、收款，一处管理。</p>
      </a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/dashboard"}}admin-drawer-nav-active{{end}}" href="/admin/dashboard">仪表盘</a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/rooms"}}admin-drawer-nav-active{{end}}" href="/admin/rooms">房源管理</a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/tenants"}}admin-drawer-nav-active{{end}}" href="/admin/tenants">租客管理</a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/payments"}}admin-drawer-nav-active{{end}}" href="/admin/payments">收款记录</a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/stats"}}admin-drawer-nav-active{{end}}" href="/admin/stats">数据统计</a>
      <a class="admin-drawer-nav-item {{if eq .CurrentPath "/admin/settings"}}admin-drawer-nav-active{{end}}" href="/admin/settings">系统设置</a>
      <a class="admin-drawer-nav-item" href="/" target="_blank" rel="noopener">查看公开页面</a>
      <form method="post" action="/admin/logout" class="mt-auto pt-4">
        <button class="admin-drawer-logout w-full" type="submit">退出登录</button>
      </form>
    </aside>
  </div>

  <div class="min-h-screen lg:flex">
    <aside class="ink-panel hidden lg:flex lg:fixed lg:inset-y-0 lg:left-0 lg:w-[240px] lg:flex-col p-6 text-stone-100">
      <a href="/admin/dashboard" class="block">
        <p class="text-xs tracking-[0.4em] text-amber-200/70">租房账本</p>
        <h1 class="mt-3 text-3xl font-black tracking-tight">房东账本</h1>
        <p class="mt-2 text-sm text-stone-300">房源、租客、收款，一处管理。</p>
      </a>
      <nav class="mt-10 flex flex-col gap-2 text-sm">
        <a class="nav-item {{if eq .CurrentPath "/admin/dashboard"}}nav-active{{end}}" href="/admin/dashboard">仪表盘</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/rooms"}}nav-active{{end}}" href="/admin/rooms">房源管理</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/tenants"}}nav-active{{end}}" href="/admin/tenants">租客管理</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/payments"}}nav-active{{end}}" href="/admin/payments">收款记录</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/stats"}}nav-active{{end}}" href="/admin/stats">数据统计</a>
        <a class="nav-item {{if eq .CurrentPath "/admin/settings"}}nav-active{{end}}" href="/admin/settings">系统设置</a>
        <a class="nav-item" href="/" target="_blank" rel="noopener">查看公开页面</a>
      </nav>
      <form method="post" action="/admin/logout" class="mt-auto pt-6">
        <button class="admin-drawer-logout w-full" type="submit">退出登录</button>
      </form>
    </aside>
    <main class="w-full pb-24 lg:pb-0 lg:pl-[240px]">
      <div class="w-full max-w-none px-4 py-6 md:px-6 md:py-8 lg:px-8">
{{if .Error}}
          <div class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{.Error}}</div>
        {{end}}
        {{template "content" .}}
      </div>
    </main>
  </div>

  <nav class="admin-bottom-tabs lg:hidden" aria-label="主要导航">
    <a class="admin-bottom-tab" href="/admin/dashboard" {{if eq .CurrentPath "/admin/dashboard"}}aria-current="page"{{end}}>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11l8-7 8 7"/><path d="M5 10v9h14v-9"/></svg>
      <span>仪表盘</span>
    </a>
    <a class="admin-bottom-tab" href="/admin/rooms" {{if eq .CurrentPath "/admin/rooms"}}aria-current="page"{{end}}>
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="6" width="16" height="13" rx="2"/><path d="M4 11h16"/></svg>
      <span>房源</span>
    </a>
    <a class="admin-bottom-tab" href="/admin/tenants" {{if eq .CurrentPath "/admin/tenants"}}aria-current="page"{{end}}>
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/></svg>
      <span>租客</span>
    </a>
    <a class="admin-bottom-tab" href="/admin/payments" {{if eq .CurrentPath "/admin/payments"}}aria-current="page"{{end}}>
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></svg>
      <span>收款</span>
    </a>
  </nav>

  <script src="{{asset "/static/js/app.js"}}"></script>
</body>
</html>
{{end}}
