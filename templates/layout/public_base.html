{{define "public_base"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · 安心租房</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-[var(--paper)] text-[var(--ink)]">
  <header class="mx-auto flex max-w-7xl items-center justify-between px-5 py-6 lg:px-10">
    <a href="/" class="group">
      <p class="text-xs font-bold tracking-[0.35em] text-amber-700">房东直租</p>
      <h1 class="text-2xl font-black tracking-tight group-hover:text-amber-800">安心租房</h1>
    </a>
    <nav class="flex items-center gap-4 text-sm font-semibold text-stone-700">
      <a href="/rooms" class="hover:text-stone-950">可租房源</a>
    </nav>
  </header>
  <main class="mx-auto max-w-7xl px-5 pb-14 lg:px-10">
    {{template "content" .}}
  </main>
  <footer class="border-t border-stone-300/70 px-5 py-8 text-center text-sm text-stone-600">
    {{if .Settings}}联系 {{.Settings.LandlordName}}：{{.Settings.LandlordPhone}}{{else}}欢迎咨询可租房源{{end}}
  </footer>
</body>
</html>
{{end}}
