{{define "content"}}
<section class="relative overflow-hidden rounded-[2.5rem] border border-stone-300/70 bg-stone-950 px-7 py-14 text-stone-50 shadow-2xl md:px-12">
  <div class="max-w-3xl">
    <p class="text-xs font-bold tracking-[0.45em] text-amber-200">城市里的安稳小屋</p>
    <h2 class="mt-5 text-5xl font-black leading-tight md:text-7xl">直接联系房东，少一点中间成本。</h2>
    <p class="mt-6 max-w-2xl text-lg leading-8 text-stone-300">精选可租房源，租金、面积、配置清清楚楚。看中房源后可直接电话咨询。</p>
    <div class="mt-8 flex flex-wrap gap-3">
      <a class="btn-primary bg-amber-700 hover:bg-amber-600" href="#room-browser">查看可租房源</a>
      <a class="rounded-full border border-white/20 px-5 py-3 font-bold text-stone-100 hover:bg-white/10" href="tel:{{.Settings.LandlordPhone}}">电话咨询</a>
    </div>
  </div>
</section>
<section id="room-browser" class="mt-10 scroll-mt-6">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <p class="text-xs font-bold tracking-[0.35em] text-amber-700">可租房源</p>
      <h3 class="mt-2 text-3xl font-black">筛选并浏览可租房源</h3>
      <p class="mt-3 text-stone-600">在首页直接筛选楼层、户型，并切换列表、网格或卡片浏览方式。</p>
    </div>
    <a class="btn-secondary w-fit" href="tel:{{.Settings.LandlordPhone}}">联系房东</a>
  </div>
  <div id="public-room-browser-dynamic">
    {{template "public_room_filters" .}}
    {{template "public_room_view_switcher" .}}
    {{template "public_room_results" .}}
  </div>
</section>
{{end}}
