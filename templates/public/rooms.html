{{define "content"}}
<section class="mb-8 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
  <div>
    <p class="text-xs font-bold tracking-[0.35em] text-amber-700">可租房源</p>
    <h2 class="mt-2 text-4xl font-black">可租房源</h2>
    <p class="mt-3 text-stone-600">只展示当前空置、可以咨询的房间。</p>
  </div>
  <a class="btn-secondary" href="tel:{{.Settings.LandlordPhone}}">联系房东</a>
</section>
<section class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
  {{range .Rooms}}
    <article class="card overflow-hidden">
      <div class="p-6">
        <span class="badge">可租</span>
        <h3 class="mt-4 text-2xl font-black">{{.RoomNo}} · {{.Title}}</h3>
        <p class="mt-3 line-clamp-3 text-sm leading-6 text-stone-600">{{.Description}}</p>
        <div class="mt-5 flex flex-wrap gap-3 text-sm text-stone-600">
          <span>{{.Area}}㎡</span>
          <span>{{.Floor}}层</span>
          <span>{{.Tags}}</span>
        </div>
        <div class="mt-6 flex items-center justify-between gap-4">
          <p class="text-3xl font-black text-amber-800">¥{{formatFen .Price}}</p>
          <a class="btn-primary" href="/room/{{.ID}}">查看详情</a>
        </div>
      </div>
    </article>
  {{else}}
    <div class="card p-12 text-center text-stone-600 md:col-span-2 xl:col-span-3">暂时没有空置房源。</div>
  {{end}}
</section>
{{end}}
